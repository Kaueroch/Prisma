spring.application.name=Sistema-para-controle-Financeiro
#Spring config properties
//configuracao que permite que o java leia o arquivo .env

spring.config.import=optional:file:.env[.properties]

spring.datasource.driver-class-name=org.postgresql.Driver
#KEYS POSTGRES CONFIG
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.url=jdbc:postgresql://localhost:${KEY_POSTGRES_PORT}/${KEY_POSTGRES_DATABASE_NAME}
spring.datasource.username=${KEY_POSTGRES_USER}
spring.datasource.password=${KEY_POSTGRES_PASSWORD}
# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=update
logging.level.org.springframework.security=DEBUG

# TOKEN INFORMATION
api.security.token.secret=${JWT_SECRET}
api.security.time.expiration.token.secret=${TIME_EXPIRATION_DTO}